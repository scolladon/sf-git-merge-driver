---
name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"

permissions:
  contents: 'read'
  pull-requests: write

# Manage concurrency to stop running jobs and start new ones in case of new commit pushed
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup dependencies, cache and install
        uses: ./.github/actions/install

      - name: Lint commits
        uses: wagoid/commitlint-github-action@v6
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
        continue-on-error: true

  pull-request-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Lint PR
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ github.token }}

  npm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup dependencies, cache and install
        uses: ./.github/actions/install

      - name: Check outdated dependencies
        run: npm outdated

      - name: Check unused dependencies
        run: npm run lint:dependencies

      - name: Audit dependencies
        run: npm audit

  megalinter:
    runs-on: ubuntu-latest
    steps:
      # Git Checkout
      - name: Checkout Code
        uses: actions/checkout@v6

      # MegaLinter
      - name: MegaLinter
        # You can override MegaLinter flavor used to have faster performances
        # More info at https://megalinter.io/latest/flavors/
        uses: oxsecurity/megalinter/flavors/javascript@v9
        env:
          # All available variables are described in documentation
          # https://megalinter.io/latest/config-file/
          APPLY_FIXES: all
          VALIDATE_ALL_CODEBASE: true
          # ADD CUSTOM ENV VARIABLES HERE TO OVERRIDE VALUES OF .mega-linter.yml AT THE ROOT OF YOUR REPOSITORY

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: megalinter-reports
          path: |
            megalinter-reports
            mega-linter.log

  build:
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit

  perf:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: google/wireit@setup-github-actions-caching/v2

      - name: Setup dependencies, cache and install
        uses: ./.github/actions/install

      - name: Run benchmarks
        run: npm run test:perf

      - name: Generate preview
        run: node test/perf/preview.mjs

      - name: Compare runtime against baseline
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Runtime Benchmark
          tool: customBiggerIsBetter
          output-file-path: ./perf-runtime.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          save-data-file: false
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: '@scolladon'
          benchmark-data-dir-path: dev/bench/runtime

      - name: Compare memory against baseline
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Memory Benchmark
          tool: customSmallerIsBetter
          output-file-path: ./perf-memory.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          save-data-file: false
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: '@scolladon'
          benchmark-data-dir-path: dev/bench/memory

      - name: Upload benchmark report
        uses: actions/upload-artifact@v6
        with:
          name: perf-report
          path: |
            perf-preview.html
            perf-runtime.json
            perf-memory.json
