---
name: E2E Tests a published version
on:
  workflow_call:
    inputs:
      channel:
        type: string
        default: latest-rc
      commit_sha:
        type: string
        description: "Commit SHA to wait for publish status"
        required: false
      status_context:
        type: string
        description: "Commit status context to wait for (e.g., npm-publish-dev, npm-publish-release)"
        required: false

jobs:
  e2e-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        node: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          ref: 'e2e/base'
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Additional setup
        run: |
          echo "SF_DISABLE_AUTOUPDATE=true" >> "$GITHUB_ENV"
          echo "SF_DISABLE_TELEMETRY=true" >> "$GITHUB_ENV"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Install cli
        run: npm install -g @salesforce/cli

      - name: Wait for npm publish to complete
        if: ${{ inputs.commit_sha != '' && inputs.status_context != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          STATUS_CONTEXT: ${{ inputs.status_context }}
        run: |
          echo "Waiting for $STATUS_CONTEXT status on $COMMIT_SHA (timeout: 30s)..."
          for i in $(seq 1 6); do
            STATUS=$(gh api "repos/${{ github.repository }}/commits/$COMMIT_SHA/status" --jq ".statuses[] | select(.context == \"$STATUS_CONTEXT\") | .state" 2>/dev/null || echo "")
            echo "Attempt $i/6 - Status: ${STATUS:-not found}"
            if [ "$STATUS" = "success" ]; then
              echo "Publish succeeded!"
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "error" ]; then
              echo "Publish failed!"
              exit 1
            fi
            sleep 5
          done
          echo "Timeout waiting for $STATUS_CONTEXT status"
          exit 1

      - name: Install new plugin version
        run: echo y | sf plugins install sf-git-merge-driver@${{ inputs.channel }}

      - name: Test new plugin version installation
        run: sf git merge driver --help

      - name: E2E Test
        run: npm run test:e2e

      - name: Check E2E test result
        run: npm run validate

      - name: Display current state
        run: git status

          
