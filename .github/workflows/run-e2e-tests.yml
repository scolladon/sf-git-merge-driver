---
name: E2E Tests a published version
on:
  workflow_call:
    inputs:
      channel:
        type: string
        default: latest-rc

jobs:
  e2e-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        node: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: 'e2e/base'
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Additional setup
        run: |
          echo "SF_DISABLE_AUTOUPDATE=true" >> "$GITHUB_ENV"
          echo "SF_DISABLE_TELEMETRY=true" >> "$GITHUB_ENV"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Install cli
        # sf CLI >=2.142 pins undici@8.5 (Node >=22.19) via jsforce-node@3.10.17,
        # breaking its own engines>=18 contract. Pin Node 20 to the last honest release.
        env:
          CLI_SPEC: ${{ matrix.node == 20 && '@salesforce/cli@2.141.6' || '@salesforce/cli' }}
        run: npm install -g "$CLI_SPEC"

      - name: Install new plugin version
        env:
          CHANNEL: ${{ inputs.channel }}
        run: echo y | sf plugins install "$CHANNEL"

      - name: Test new plugin version installation
        run: sf git merge driver --help

      - name: E2E Test
        run: npm run test:e2e

      - name: Check E2E test result
        run: npm run validate

      - name: Display current state
        run: git status
