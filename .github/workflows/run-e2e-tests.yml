---
name: E2E Tests a published version
on:
  workflow_call:
    inputs:
      channel:
        type: string
        default: latest-rc

jobs:
  e2e-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        node: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          ref: 'e2e/base'
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Additional setup
        run: |
          echo "SF_DISABLE_AUTOUPDATE=true" >> "$GITHUB_ENV"
          echo "SF_DISABLE_TELEMETRY=true" >> "$GITHUB_ENV"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Install cli
        run: npm install -g @salesforce/cli

      - name: Wait for package to be available on npm
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          echo "Waiting for sf-git-merge-driver@$CHANNEL to be available on npm..."
          for i in $(seq 1 30); do
            if npm view "sf-git-merge-driver@$CHANNEL" version 2>/dev/null; then
              echo "Package is available!"
              exit 0
            fi
            echo "Attempt $i/30 - Package not yet available, waiting 10s..."
            sleep 10
          done
          echo "Package not available after 5 minutes"
          exit 1

      - name: Install new plugin version
        run: echo y | sf plugins install sf-git-merge-driver@${{ inputs.channel }}

      - name: Test new plugin version installation
        run: sf git merge driver --help

      - name: E2E Test
        run: npm run test:e2e

      - name: Check E2E test result
        run: npm run validate

      - name: Display current state
        run: git status

          
