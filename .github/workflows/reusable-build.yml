---
name: Build Checks
on:
  workflow_call:
    inputs:
      os:
        description: Runner OS (e.g. ubuntu-latest, macos-latest, windows-latest)
        type: string
        default: ubuntu-latest
      node-version:
        description: Node.js major version to install
        type: string
        default: "20"

jobs:
  source:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - uses: google/wireit@setup-github-actions-caching/v2

      - name: Setup dependencies, cache and install
        uses: ./.github/actions/install

      - name: Lint plugin
        run: npm run lint

      - name: Build plugin
        run: npm pack

      - name: Unit test
        run: npm run test:unit

      - name: Install cli
        run: npm install -g @salesforce/cli

      - name: Integration test
        run: npm run test:nut

      - uses: actions/upload-artifact@v6
        if: inputs.os == 'ubuntu-latest' && inputs.node-version == '20'
        with:
          name: coverage-test-report
          path: reports/coverage
