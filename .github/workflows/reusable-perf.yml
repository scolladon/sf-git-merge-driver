---
name: Performance Benchmarks
on:
  workflow_call:
    inputs:
      auto-push:
        description: Push benchmark data to gh-pages
        type: boolean
        default: false

jobs:
  perf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: google/wireit@setup-github-actions-caching/v2

      - name: Setup dependencies, cache and install
        uses: ./.github/actions/install

      # ── Baseline (main branch) benchmarks ──────────────────────────
      - name: Checkout main for baseline
        if: github.event_name == 'pull_request'
        run: git checkout "$BASE_SHA"

      - name: Install baseline dependencies
        if: github.event_name == 'pull_request'
        run: npm ci

      - name: Run baseline benchmarks
        if: github.event_name == 'pull_request'
        run: npm run test:perf

      - name: Save baseline results
        if: github.event_name == 'pull_request'
        run: |
          cp perf-runtime.json perf-runtime-baseline.json
          cp perf-memory.json perf-memory-baseline.json

      # ── PR branch benchmarks ───────────────────────────────────────
      - name: Checkout PR branch
        if: github.event_name == 'pull_request'
        run: git checkout "$HEAD_SHA"

      - name: Install PR dependencies
        if: github.event_name == 'pull_request'
        run: npm ci

      - name: Run benchmarks
        run: npm run test:perf

      # ── Compare on same runner (PR only) ───────────────────────────
      - name: Compare baseline vs PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node test/perf/compare.mjs perf-runtime-baseline.json perf-runtime.json

      - name: Checkout gh-pages baseline data
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-data

      - name: Generate preview with trends
        run: node test/perf/preview.mjs gh-pages-data

      - name: Runtime benchmark
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Runtime Benchmark
          tool: customBiggerIsBetter
          output-file-path: ./perf-runtime.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ inputs.auto-push }}
          save-data-file: ${{ inputs.auto-push }}
          alert-threshold: '130%'
          comment-on-alert: ${{ inputs.auto-push }}
          fail-on-alert: false
          summary-always: ${{ inputs.auto-push }}
          alert-comment-cc-users: '@scolladon'
          benchmark-data-dir-path: dev/bench/runtime

      - name: Latency benchmark
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Latency Benchmark
          tool: customSmallerIsBetter
          output-file-path: ./perf-memory.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ inputs.auto-push }}
          save-data-file: ${{ inputs.auto-push }}
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: ${{ inputs.auto-push }}
          fail-on-alert: false
          summary-always: ${{ inputs.auto-push }}
          alert-comment-cc-users: '@scolladon'
          benchmark-data-dir-path: dev/bench/memory

      - name: Upload benchmark report
        uses: actions/upload-artifact@v6
        with:
          name: perf-report
          path: |
            perf-preview.html
            perf-runtime.json
            perf-memory.json
            perf-runtime-baseline.json
            perf-memory-baseline.json
